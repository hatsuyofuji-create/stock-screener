# LINE通知だけを素早く試す（手動実行専用）。
# データ取得はせず、既存の db/ranking.csv からメッセージを作って LINE に送るだけ。
# 使い方: GitHub の Actions → line-test → Run workflow
name: line-test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jp-sector-flow
    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Send LINE test
        run: python notify_test.py
